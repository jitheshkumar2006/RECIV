<!DOCTYPE html>
<html>
<head>
  <title>RECIV - Smart Civic Intelligence</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color: white;
      min-height: 100vh;
      padding-bottom: 50px;
    }

    .hero {
      text-align: center;
      padding: 50px 0;
    }

    .title {
      font-size: 3.5rem;
      font-weight: 700;
    }

    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    input, textarea, select {
      background: rgba(255,255,255,0.9) !important;
      border: none !important;
    }

    button {
      font-weight: 600;
    }

    #leaderboardBox {
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1 class="title">RECIV</h1>
    <h4>Smart Civic Intelligence Platform</h4>
    <p>Transforming Complaints into Transparent Governance</p>
  </div>

  <!-- MAIN CARD -->
  <div class="row justify-content-center">
    <div class="col-lg-6 glass">

      <h4 class="text-center mb-4">Report Civic Issue</h4>

      <input class="form-control mb-3" id="title" placeholder="Issue Title">

      <select class="form-select mb-3" id="category">
        <option value="">Select Category</option>
        <option value="Road">Road Issue</option>
        <option value="Garbage">Garbage Problem</option>
        <option value="Water">Water Leakage</option>
        <option value="Electricity">Electricity Issue</option>
      </select>

      <textarea class="form-control mb-3" id="desc" placeholder="Description"></textarea>

      <input class="form-control mb-3" type="file" id="photo">

      <button class="btn btn-primary w-100 mb-4" onclick="submitComplaint()">
        Submit Complaint
      </button>

      <hr>

      <h5 class="text-center">Check Complaint Status</h5>

      <input class="form-control mb-3" id="complaintId" placeholder="Enter Complaint ID">

      <button class="btn btn-success w-100" onclick="checkStatus()">
        Check Status
      </button>

      <div id="statusBox" class="mt-3"></div>

      <hr>

      <h5 class="text-center">Department Leaderboard</h5>

      <div id="leaderboardBox"></div>

    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- IMPORTANT: Script must be last -->
<script src="script.js"></script>

</body>
</html>
