<!DOCTYPE html>
<html>
<head>
<title>RECIV - Smart Civic Intelligence</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:black;
  overflow-x:hidden;
}

/* Background */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.85)),
    url("https://images.unsplash.com/photo-1465447142348-e9952c393450") center/cover;
  z-index:-2;
}

/* AI Suggestion Box */
.ai-box{
  background:rgba(0,255,200,0.15);
  border:1px solid #00ffd5;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  display:none;
  color:white;
}

.hero{text-align:center;color:white;padding:50px 0;}
.title{
  font-size:4rem;
  font-weight:700;
  background:linear-gradient(90deg,#fff,#00e5ff,#00ffd5);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.glass{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

input,textarea,select{
  background:rgba(255,255,255,0.9)!important;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1 class="title">RECIV</h1>
  <h4>Smart Civic Intelligence Platform</h4>
</div>

<div class="row justify-content-center">
<div class="col-lg-6 glass">

<h4 class="text-center text-white mb-4">Report Civic Issue</h4>

<input class="form-control mb-3" id="title" placeholder="Issue Title">

<select class="form-select mb-3" id="category">
<option value="">Select Category</option>
<option value="Road">Road Issue</option>
<option value="Garbage">Garbage Problem</option>
<option value="Water">Water Leakage</option>
<option value="Electricity">Electricity Issue</option>
</select>

<textarea class="form-control mb-3" id="desc" placeholder="Description"></textarea>

<input class="form-control mb-3" type="file" id="photo">

<button class="btn btn-primary w-100 mb-4" onclick="submitComplaint()">
Submit Complaint
</button>

<!-- 🔥 AI SUGGESTION DISPLAY -->
<div id="aiBox" class="ai-box"></div>

<hr class="text-white">

<h5 class="text-white text-center">Check Complaint Status</h5>

<input class="form-control mb-3" id="complaintId" placeholder="Enter Complaint ID">

<button class="btn btn-success w-100" onclick="checkStatus()">Check Status</button>

<div id="statusBox" class="mt-3 text-white"></div>

</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="script.js"></script>

<script>
/* SHOW AI SUGGESTIONS */
function showAI(dept, priority, recurring){
  let box = document.getElementById("aiBox");
  box.style.display = "block";

  box.innerHTML = `
  <b>🤖 AI Suggestions:</b><br><br>
  Assigned Department: <b>${dept}</b><br>
  Priority Level: <b>${priority}</b><br>
  ${recurring ? "⚠ Recurring Issue Detected!" : ""}
  `;
}
</script>

</body>
</html>
